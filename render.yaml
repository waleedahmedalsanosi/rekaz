services:
  # ── React + Express frontend ───────────────────────────────────────────────
  - type: web
    name: zeina
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      # DOTNET_API_URL (runtime) — used by the Express /dotnet-api proxy.
      # Set to the deployed .NET service URL, e.g. https://ziena-dotnet.onrender.com
      - key: DOTNET_API_URL
        sync: false
      # VITE_DOTNET_API_URL (build-time) — baked into the React bundle.
      # When set the browser calls .NET directly (better performance).
      # Same value as DOTNET_API_URL. If not set, the Express proxy above is used.
      - key: VITE_DOTNET_API_URL
        sync: false
      # Security
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      # Moyasar payment gateway (sandbox → live when ready)
      - key: MOYASAR_SECRET_KEY
        sync: false
      - key: MOYASAR_PUBLISHABLE_KEY
        sync: false
      - key: MOYASAR_WEBHOOK_SECRET
        sync: false
      # OTPless WhatsApp OTP
      - key: OTPLESS_CLIENT_ID
        sync: false
      - key: OTPLESS_CLIENT_SECRET
        sync: false
      # Sentry error tracking (server DSN)
      - key: SENTRY_DSN
        sync: false
      # PostHog + Sentry frontend (baked into React bundle at build time)
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_POSTHOG_KEY
        sync: false

  # ── .NET 10 Clean Architecture backend ────────────────────────────────────
  - type: web
    name: ziena-dotnet
    runtime: docker
    plan: free
    dockerfilePath: ./Ziena.Backend/Dockerfile
    dockerContext: ./Ziena.Backend
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      # VAPID keys — set once, never change, so browser push subscriptions survive re-deploys.
      # Generate with: node -e "const w=require('web-push');w.generateVAPIDKeys().then(k=>console.log(JSON.stringify(k)))"
      # Or let the app generate them on first boot (check startup logs for the public key).
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
