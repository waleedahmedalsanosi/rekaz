services:
  # ── React + Express frontend ───────────────────────────────────────────────
  - type: web
    name: zeina
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      # DOTNET_API_URL (runtime) — used by the Express /dotnet-api proxy.
      # Set to the deployed .NET service URL, e.g. https://ziena-dotnet.onrender.com
      - key: DOTNET_API_URL
        sync: false
      # VITE_DOTNET_API_URL (build-time) — baked into the React bundle.
      # When set the browser calls .NET directly (better performance).
      # Same value as DOTNET_API_URL. If not set, the Express proxy above is used.
      - key: VITE_DOTNET_API_URL
        sync: false

  # ── .NET 10 Clean Architecture backend ────────────────────────────────────
  - type: web
    name: ziena-dotnet
    runtime: docker
    plan: free
    dockerfilePath: ./Ziena.Backend/Dockerfile
    dockerContext: ./Ziena.Backend
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
